workflows:
  ios-release:
    name: iOS Release — くますず
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: jp.nicchizu.smartbearbell
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Flutter build ipa
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=$CM_EXPORT_OPTIONS_PATH

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - mt166431@gmail.com
