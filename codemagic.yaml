workflows:
  ios-release:
    name: iOS Release — くますず
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Set up signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files jp.nicchizu.smartbearbell \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          echo "Profiles directory:"
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ || true

      - name: Build ipa
        script: |
          # Get profile name dynamically
          PROFILE_UUID=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          PROFILE_NAME=$(python3 -c "
          import plistlib, subprocess, sys
          data = subprocess.run(['security', 'cms', '-D', '-i', '$PROFILE_UUID'], capture_output=True).stdout
          p = plistlib.loads(data)
          print(p.get('Name',''))
          " 2>/dev/null || echo "")
          echo "Profile name: $PROFILE_NAME"

          python3 -c "
          import plistlib
          plist = {'method': 'app-store'}
          with open('/tmp/ExportOptions.plist', 'wb') as f:
              plistlib.dump(plist, f)
          "
          flutter build ipa \
            --release \
            --export-options-plist=/tmp/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - mt166431@gmail.com
