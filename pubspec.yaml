name: smart_bear_bell
description: Smart Bear Bell 窶・urban bear encounter prevention app
version: 1.0.0+2
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  just_audio: ^0.9.42
  sensors_plus: 7.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: 13.0.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/
    - assets/audio/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#0D0D0D"
  image: assets/splash/splash_logo.png
  color_dark: "#0D0D0D"
  image_dark: assets/splash/splash_logo.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#0D0D0D"
    image: assets/splash/splash_logo.png
